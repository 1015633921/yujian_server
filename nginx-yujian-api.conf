server {
    listen 80;
    listen [::]:80;
    server_name api.yustream.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.yustream.cn;

    ssl_certificate /etc/letsencrypt/live/api.yustream.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yustream.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:yujian_ssl:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20m;
    access_log /var/log/nginx/yujian-api.access.log yujian_ext;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
