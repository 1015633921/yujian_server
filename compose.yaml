services:
  api:
    build:
      context: .
    container_name: yujian-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./certs:/opt/yujian_server/certs:ro
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      APP_ENV: production
      DATABASE_BACKEND: mysql
    networks:
      - default
      - backend
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.0
    container_name: yujian-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    env_file:
      - .env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --innodb-buffer-pool-size=512M
      - --innodb-log-buffer-size=16M
      - --max-connections=100
      - --table-open-cache=800
      - --performance-schema=OFF
      - --skip-name-resolve
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - default
      - backend
    mem_limit: 1g
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  api-test:
    build:
      context: .
    container_name: yujian-api-test
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./data:/app/data:ro
      - ./certs:/opt/yujian_server/certs:ro
    env_file:
      - .env.test
    environment:
      TZ: Asia/Shanghai
      APP_ENV: test
      DATABASE_BACKEND: mysql
    networks:
      - default
      - backend
    depends_on:
      mysql:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  backend:
    internal: true
