services:
  api:
    build:
      context: .
    container_name: yujian-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./certs:/opt/yujian_server/certs:ro
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
